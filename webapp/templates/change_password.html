{% extends "base.html" %}
{% block title %}Change Password — TradeBot{% endblock %}
{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="card" style="max-width:500px; margin:0 auto">
  <div class="card-header">Change Your Password</div>
  <div class="card-body">
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    {% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Current Password</label>
        <input type="password" name="current_password" class="form-input" required>
      </div>
      <div class="form-group">
        <label>New Password (min 10 characters)</label>
        <input type="password" name="new_password" class="form-input" minlength="10" required>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-input" minlength="10" required>
      </div>
      <button type="submit" class="btn btn-primary">Update Password</button>
      <a href="{{ url_for('dashboard.overview') }}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
