# Backtest Control Bot (HY/EN)
# Backtest-ի կառdelays համdelays Telegram bot
# Telegram bot for backtest management and monitoring
backtest_bot:
  token: "8692637760:AAE1Ps3mYScTeBsKfQ39VpU9jhCi9-c4kdY"
  admin_user_ids: [6143054838]

signals:
  sl_pct: 2.0
  tp_pcts: [2.0, 4.0, 6.0]

execution:
  tp_mode: 1
  auto_sl_tp_enabled: true
  # Global toggle for dynamic (delayed) entries.
  # When false, the bot enters immediately at market using the signal price.
  # When true, accounts that have entry_offset_pct configured will delay
  # entries until price reaches the offset target or the per-account timeout
  # expires.
  dynamic_entry_enabled: true

position_timeout:
  enabled: true        # When true, close positions that stay open longer than max_hours.
  max_hours: 4.0        # UPGRADED 2h→4h: gives price more time to reach TP. Fees per 4h ≈ $0.02 (negligible).
